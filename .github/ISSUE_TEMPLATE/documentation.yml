name: 📚 Documentation Issue
description: Report missing, unclear, or incorrect documentation for AEO Box
title: "[DOCS] "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        ## Help us improve our documentation!

        Good documentation is crucial for a great developer experience. Please let us know what's missing or confusing.
        
  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation Type
      description: What kind of documentation issue is this?
      options:
        - Missing documentation (feature not documented)
        - Unclear/confusing documentation
        - Incorrect/outdated documentation
        - Typo or formatting issue
        - Missing code examples
        - Broken links
        - Other
    validations:
      required: true
      
  - type: input
    id: location
    attributes:
      label: Documentation Location
      description: Where did you encounter this issue? Provide a URL or file path if possible
      placeholder: "e.g., README.md, CLAUDE.md, or documentation folder path"
    validations:
      required: false
      
  - type: input
    id: section
    attributes:
      label: Section/Topic
      description: Which specific section or topic needs improvement?
      placeholder: "e.g., AEO Skill Configuration, Multi-Agent Setup, Citation Tracking"
    validations:
      required: true
      
  - type: textarea
    id: current
    attributes:
      label: Current Documentation
      description: |
        What does the documentation currently say?
        Quote the specific text if applicable.
      placeholder: |
        The docs currently say:
        "To configure AEO analysis, set up your content analyzer..."

        But it doesn't explain...
    validations:
      required: false
      
  - type: textarea
    id: issue
    attributes:
      label: What's Wrong or Missing?
      description: Explain what's incorrect, unclear, or missing
      placeholder: |
        The documentation doesn't explain how to:
        - Configure citation tracking for multiple LLMs
        - Set up the multi-agent orchestrator
        - Customize query research parameters

        The example code doesn't work because...
    validations:
      required: true
      
  - type: textarea
    id: suggested
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved? Provide suggested text if possible
      placeholder: |
        The documentation should include:

        1. A complete example showing how to track citations for ChatGPT and Perplexity
        2. Explanation of common errors like "citation tracker initialization failed"
        3. Step-by-step guide for configuring the multi-agent orchestrator

        Suggested text:
        "To configure citation tracking for multiple LLMs, add them to your configuration..."
    validations:
      required: true
      
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How much does this documentation issue affect users?
      options:
        - High - Prevents users from using a feature
        - Medium - Makes feature difficult to understand
        - Low - Minor confusion or inconvenience
    validations:
      required: true
          
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        - Screenshots showing the issue
        - Links to related documentation
        - Examples from other projects that do this well
      placeholder: Any additional information that would help...
    validations:
      required: false
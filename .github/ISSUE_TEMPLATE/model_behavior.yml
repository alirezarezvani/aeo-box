name: 🤖 Model Behavior Issue
description: Report unexpected AEO agent behavior, incorrect actions, or analysis issues
title: "[MODEL] "
labels:
  - model
body:
  - type: markdown
    attributes:
      value: |
        ## Report Unexpected Agent Behavior

        Use this template when an AEO agent does something unexpected, produces incorrect analysis, or behaves inconsistently with your instructions.

        **This is for:** Unexpected agent actions, incorrect analysis results, ignoring parameters, wrong recommendations
        **NOT for:** Crashes, API errors, or installation issues (use Bug Report instead)
        
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      description: Please confirm before submitting
      options:
        - label: I have searched [existing issues](https://github.com/alirezarezvani/aeo-box/issues?q=is%3Aissue%20state%3Aopen%20label%3Amodel) for similar behavior reports
          required: true
        - label: This report does NOT contain sensitive information (API keys, passwords, etc.)
          required: true
          
  - type: dropdown
    id: behavior_type
    attributes:
      label: Type of Behavior Issue
      description: What category best describes the unexpected behavior?
      options:
        - Incorrect citation analysis results
        - Wrong content optimization recommendations
        - Agent ignored configuration parameters
        - Orchestrator failed to coordinate subagents properly
        - Query research returned irrelevant data
        - Report generation included incorrect metrics
        - Adaptive learning made wrong predictions
        - Agent behavior changed between runs
        - Subagent behaved unexpectedly
        - Other unexpected behavior
    validations:
      required: true
      
  - type: textarea
    id: what_you_asked
    attributes:
      label: What You Asked AEO to Do
      description: Provide the exact command or parameters you used
      placeholder: |
        I asked AEO to: "Analyze content for ChatGPT citation optimization"

        Or I ran: `aeo analyze --content article.md --llm chatgpt --optimize`
    validations:
      required: true
      
  - type: textarea
    id: what_aeo_did
    attributes:
      label: What AEO Actually Did
      description: Describe step-by-step what AEO did instead
      placeholder: |
        1. AEO analyzed the content
        2. Instead of ChatGPT optimization, it provided Perplexity recommendations
        3. Citation tracking showed 0 results despite actual citations
        4. Report included metrics for wrong LLM
        5. Optimization suggestions were irrelevant to the query
    validations:
      required: true
      
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should AEO have done?
      placeholder: |
        AEO should have:
        1. Analyzed content specifically for ChatGPT
        2. Tracked citations correctly
        3. Provided relevant optimization recommendations
        4. Generated report with accurate metrics
    validations:
      required: true
      
  - type: textarea
    id: files_affected
    attributes:
      label: Files/Data Affected
      description: |
        List all files, data sources, or outputs that were affected
      placeholder: |
        Input files:
        - article.md (analyzed content)
        - queries.json (search queries)

        Generated output:
        - report.json (incorrect metrics)
        - citations.csv (missing data)
      render: shell
    validations:
      required: false
      
  - type: dropdown
    id: agent_mode
    attributes:
      label: Agent Mode
      description: Which agent mode/configuration was active?
      options:
        - Single agent (AEO Skill only)
        - Multi-agent system (Orchestrator + Subagents)
        - Custom configuration
        - I don't know / Not sure
    validations:
      required: true
      
  - type: dropdown
    id: reproducible
    attributes:
      label: Can You Reproduce This?
      description: Does this happen consistently?
      options:
        - Yes, every time with the same prompt
        - Sometimes (intermittent)
        - No, only happened once
        - Haven't tried to reproduce
    validations:
      required: true
      
  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to Reproduce
      description: If reproducible, provide minimal steps
      placeholder: |
        1. Create a new directory with a simple README.md
        2. Ask Claude Code to "improve the README"
        3. Claude will delete and recreate the file instead of editing
    validations:
      required: false
      
  - type: dropdown
    id: component
    attributes:
      label: AEO Component
      description: Which component exhibited the unexpected behavior?
      options:
        - Content Analyzer
        - Citation Tracker
        - Query Researcher
        - Optimizer
        - Report Generator
        - Adaptive Learning
        - Orchestrator
        - Subagent
        - Not sure
        - Other
    validations:
      required: true
      
  - type: textarea
    id: agent_log
    attributes:
      label: Relevant Agent Output
      description: |
        Include relevant parts of the agent's output or logs
      placeholder: |
        Agent output:
        "Analyzing content for citation optimization...
        Target LLM: Perplexity (expected: ChatGPT)
        Citations found: 0 (actual: 5 citations present)"

        [Then generated report with wrong data]
      render: markdown
    validations:
      required: false
      
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How severe was the impact of this behavior?
      options:
        - Critical - Data loss or corrupted project
        - High - Significant unwanted changes
        - Medium - Extra work to undo changes
        - Low - Minor inconvenience
    validations:
      required: true
      
  - type: input
    id: version
    attributes:
      label: AEO Box Version
      description: Run `aeo --version` or check your installed version
      placeholder: "e.g., 1.0.0"
    validations:
      required: true
      
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which API platform are you using?
      options:
        - Anthropic API
        - AWS Bedrock
        - Google Vertex AI
        - Other
    validations:
      required: true
      
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        - Any patterns you've noticed
        - Similar behavior in other sessions
        - Specific file types or project structures that trigger this
        - Screenshots if relevant
      placeholder: |
        This seems to happen more often with:
        - Python projects
        - When there are multiple similar files
        - After long conversations
    validations:
      required: false
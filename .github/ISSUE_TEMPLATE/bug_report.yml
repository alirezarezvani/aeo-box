name: 🐛 Bug Report
description: Report a bug or unexpected behavior in AEO Box
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the sections below to help us understand and fix the issue.

        Before submitting, please check:
        - You're using the latest version of AEO Box
        - This issue hasn't already been reported by searching [existing issues](https://github.com/alirezarezvani/aeo-box/issues?q=is%3Aissue%20state%3Aopen%20label%3Abug).
        - This is a bug, not a feature request or support question
        
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      description: Please confirm before submitting
      options:
        - label: I have searched [existing issues](https://github.com/alirezarezvani/aeo-box/issues?q=is%3Aissue%20state%3Aopen%20label%3Abug) and this hasn't been reported yet
          required: true
        - label: This is a single bug report (please file separate reports for different bugs)
          required: true
        - label: I am using the latest version of AEO Box
          required: true
          
  - type: textarea
    id: actual
    attributes:
      label: What's Wrong?
      description: Describe what's happening that shouldn't be
      placeholder: |
        When I try to run AEO analysis on my content, I get an error "Failed to analyze citations" and no report is generated.

        The analysis fails after processing the first query...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What Should Happen?
      description: Describe the expected behavior
      placeholder: AEO should analyze the content successfully and generate a citation performance report
    validations:
      required: true
      
  - type: textarea
    id: error_output
    attributes:
      label: Error Messages/Logs
      description: If you see any error messages, paste them here
      placeholder: |
        Paste any error output, stack traces, or relevant logs here.
        This will be automatically formatted as code.
      render: shell
    validations:
      required: false
      
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: |
        Please provide clear, numbered steps that anyone can follow to reproduce the issue.
        **Important**: Include any necessary code, file contents, or context needed to reproduce the bug.
        If the issue involves specific files or code, please create a minimal example.
      placeholder: |
        1. Prepare content file `article.md` with sample content
        2. Run AEO analysis: `aeo analyze --content article.md --queries queries.json`
        3. Specify target LLMs: ChatGPT, Perplexity
        4. Error appears: "Unable to track citations..."

        Note: The bug only happens when...
    validations:
      required: true
      
  - type: dropdown
    id: component
    attributes:
      label: AEO Component
      description: Which component is affected?
      options:
        - AEO Skill (Content Analysis/Optimization)
        - Multi-Agent System (Orchestrator/Subagents)
        - Citation Tracking
        - Query Research
        - Report Generation
        - Adaptive Learning
        - CLI/Commands
        - API Integration
        - Other
    validations:
      required: false
      
  - type: dropdown
    id: regression
    attributes:
      label: Is this a regression?
      description: Did this work in a previous version? 
      options:
        - "Yes, this worked in a previous version"
        - "No, this never worked"
        - "I don't know"
    validations:
      required: true
      
  - type: input
    id: working_version
    attributes:
      label: Last Working Version
      description: If this is a regression, which version last worked? This helps expedite a fix.
      placeholder: "e.g., 1.0.100"
    validations:
      required: false
      
  - type: input
    id: version
    attributes:
      label: AEO Box Version
      description: Run `aeo --version` or check your installed version
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which API platform are you using?
      options:
        - Anthropic API
        - Other
    validations:
      required: true
      
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Ubuntu/Debian Linux
        - Other Linux
        - Other
    validations:
      required: true
      
  - type: dropdown
    id: terminal
    attributes:
      label: Terminal/Shell
      description: Which terminal/environment are you using?
      options:
        - Terminal.app (macOS)
        - iTerm2
        - VS Code integrated terminal
        - PyCharm terminal
        - Windows Terminal
        - PowerShell
        - WSL (Windows Subsystem for Linux)
        - Non-interactive/CI environment
        - Other
    validations:
      required: true
      
  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: |
        Anything else that might help us understand the issue?
        - Screenshots (drag and drop images here)
        - Configuration files
        - Related files or code
        - Links to repositories demonstrating the issue
      placeholder: Any additional context, screenshots, or information...
    validations:
      required: false